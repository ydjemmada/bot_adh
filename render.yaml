services:
  - type: worker
    name: adhahi-telegram-monitor
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 30
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CHECK_INTERVAL_SECONDS
        value: 600
      - key: CHECK_TIMEOUT_SECONDS
        value: 90
      - key: API_TIMEOUT_SECONDS
        value: 20
      - key: GOTO_TIMEOUT_SECONDS
        value: 45
      - key: SELECTOR_TIMEOUT_SECONDS
        value: 30
      - key: NAVIGATION_RETRIES
        value: 3
      - key: FIRST_CHECK_DELAY_SECONDS
        value: 180
      - key: TARGET_URL
        value: https://adhahi.dz/register
      - key: WILAYA_QUOTAS_API_URL
        value: https://adhahi.dz/api/v1/public/wilaya-quotas
      - key: BROWSER_FALLBACK_ENABLED
        value: false
      - key: ERROR_SCREENSHOT_PATH
        value: ""
